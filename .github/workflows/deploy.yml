name: Deploy pixel-track

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 19785 172.98.22.157 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 19785 \
              -o StrictHostKeyChecking=no \
              root@172.98.22.157 \
              "cd /root/pixel-track && git pull origin main && docker compose down && docker compose up -d --build"